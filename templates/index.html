<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NARSA Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .option-active { background: #3b82f6 !important; color: white; border-color: #60a5fa !important; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col text-slate-200">

    <div id="start-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950">
        <button onclick="startQuiz()" class="bg-blue-600 text-white px-10 py-5 rounded-2xl text-2xl font-bold hover:bg-blue-500">ابدأ الاختبار</button>
    </div>

    <!-- Audio elements -->
    <audio id="sound-correct" src="static/sounds/correct.mp3"></audio>
    <audio id="sound-wrong" src="static/sounds/wrong.mp3"></audio>
    <audio id="audio-q"></audio>
    <audio id="audio-exp"></audio>

    <div class="max-w-5xl mx-auto w-full grid grid-cols-1 md:grid-cols-4 gap-4">
        <div class="md:col-span-3 flex flex-col gap-4">
            <div class="bg-slate-950 rounded-xl border border-slate-700 aspect-video flex items-center justify-center overflow-hidden">
                <!-- Using a relative path for images -->
                <img id="q-img" src="" class="w-full h-full object-cover" alt="Question Image">
            </div>
            <div class="glass p-6 rounded-xl border border-slate-700">
                <p id="q-text" class="text-xl font-bold mb-4">يرجى الضغط على ابدأ...</p>
                <div id="options" class="space-y-3"></div>
            </div>
        </div>

        <div class="md:col-span-1 glass rounded-xl p-4 flex flex-col gap-4 border border-slate-700">
            <div id="choices" class="grid grid-cols-2 gap-2">
                <button class="bg-slate-800 py-6 rounded-xl font-bold border border-slate-700" onclick="toggle(1)" id="btn-1">1</button>
                <button class="bg-slate-800 py-6 rounded-xl font-bold border border-slate-700" onclick="toggle(2)" id="btn-2">2</button>
                <button class="bg-slate-800 py-6 rounded-xl font-bold border border-slate-700" onclick="toggle(3)" id="btn-3">3</button>
                <button class="bg-slate-800 py-6 rounded-xl font-bold border border-slate-700" onclick="toggle(4)" id="btn-4">4</button>
            </div>
            <button onclick="nextQ()" class="bg-emerald-600 py-4 rounded-xl font-bold">Valider</button>
        </div>
    </div>

    <script>
        const questions = [
            // Ensure files in /static/images/ and /static/sounds/ match these names
            { q: "وضع صفائح تسجيل مزورة...", o: ["الخيار 1", "الخيار 2", "الخيار 3", "الخيار 4"], c: [1, 2, 4], audioQ: "q1_q.mp3", audioE: "q1_exp.mp3" }
        ];

        let idx = 0, selected = [];

        function startQuiz() {
            document.getElementById('start-screen').style.display = 'none';
            loadQ();
        }

        function loadQ() {
            selected = [];
            document.querySelectorAll('button').forEach(b => b.classList.remove('option-active'));
            const d = questions[idx];
            
            // Set Image
            document.getElementById('q-img').src = `static/images/q${idx + 1}.webp`;
            document.getElementById('q-text').innerText = d.q;
            
            // Set Question Audio to q1_q.mp3 pattern
            const qAudio = document.getElementById('audio-q');
            qAudio.src = `static/sounds/${d.audioQ}`;
            qAudio.play();

            const list = document.getElementById('options');
            list.innerHTML = '';
            d.o.forEach((opt, i) => {
                list.innerHTML += `<div class="p-4 rounded-xl border border-slate-700 cursor-pointer hover:bg-slate-700" onclick="toggle(${i+1})" id="row-${i+1}">${i+1}: ${opt}</div>`;
            });
        }

        function toggle(id) {
            const btn = document.getElementById(`btn-${id}`);
            const row = document.getElementById(`row-${id}`);
            const i = selected.indexOf(id);
            if (i > -1) { selected.splice(i, 1); btn.classList.remove('option-active'); row.classList.remove('option-active'); }
            else { selected.push(id); btn.classList.add('option-active'); row.classList.add('option-active'); }
        }

        function nextQ() {
            if (selected.length === 0) return;
            const exp = document.getElementById('audio-exp');
            exp.src = `static/sounds/${questions[idx].audioE}`;
            exp.play();
            setTimeout(() => { if(idx < questions.length - 1) { idx++; loadQ(); } }, 3000);
        }
    </script>
</body>
</html>
